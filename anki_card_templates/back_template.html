<div class="apple-container">
    <div class="question-main">
        {{问题}}
    </div>

    <div class="answer-main">
        {{答案}}
    </div>

    {{#Advanced URI}}
    <div style="margin-bottom: 20px;">
        <a href="{{Advanced URI}}" class="ios-button">
            Open in Obsidian
        </a>
    </div>
    {{/Advanced URI}}

    {{#原来的笔记}}
    <div class="ios-card">
        <div class="card-header">CONTEXT</div>
        <div class="card-body">
            {{原来的笔记}}
        </div>
    </div>
    {{/原来的笔记}}

    <a id="comprehension-toast" class="comprehension-toast" style="display: none; margin-bottom: 20px; text-decoration: none;" href="#">
        <span class="toast-icon">💡</span>
        <div class="toast-message">
            関連するノートの復習をお勧めします
        </div>
    </a>
</div>

<script>
setTimeout(() => {
    const blockquotes = document.querySelectorAll('.card-body blockquote');
    
    blockquotes.forEach(bq => {
        let html = bq.innerHTML;
        
        // 匹配 [!类型] 标题，忽略它被什么 HTML 标签包裹
        // 捕获组1: 类型 (如 Note)
        // 捕获组2: 标题 (如 Anki)
        const regex = /\[!([a-zA-Z0-9_-]+)\]([^<]*)/;
        const match = html.match(regex);
        
        if (match) {
            const type = match[1].trim();
            const title = match[2].trim() || type; // 如果没写标题，就用类型名
            
            // 把第一行（匹配到的 [!类型] 标题）从原本的 HTML 中删掉
            let contentHtml = html.replace(match[0], '').trim();
            
            // 清理紧跟在标题后面的换行标签 (处理 Anki 随机生成的 <br> 或 <div>)
            contentHtml = contentHtml.replace(/^(?:\s*<br\s*\/?>\s*|<div>\s*<br\s*\/?>\s*<\/div>\s*|<p>\s*<br\s*\/?>\s*<\/p>\s*)+/gi, '');

            // 创建符合 iOS 风格的 Callout 容器
            const calloutDiv = document.createElement('div');
            calloutDiv.className = `ios-callout ios-callout-${type.toLowerCase()}`;
            
            // 组装最终的 HTML
            calloutDiv.innerHTML = `
                <div class="ios-callout-title">${title}</div>
                <div class="ios-callout-content">${contentHtml}</div>
            `;
            
            // 替换原有的 blockquote
            bq.parentNode.replaceChild(calloutDiv, bq);
        }
    });
}, 0);

// --- 理解度监控与提醒逻辑 ---
setTimeout(() => {
    const advancedUri = "{{Advanced URI}}";
    if (!advancedUri) return;

    fetch("http://127.0.0.1:8765", {
        method: "POST",
        body: JSON.stringify({
            action: "findCards",
            version: 6,
            params: { query: `"Advanced URI:${advancedUri}"` }
        })
    })
    .then(r => r.json())
    .then(res => {
        const cardIds = res.result;
        if (!cardIds || cardIds.length === 0) return;
        
        return fetch("http://127.0.0.1:8765", {
            method: "POST",
            body: JSON.stringify({
                action: "cardsInfo",
                version: 6,
                params: { cards: [cardIds[0]] }
            })
        }).then(r => r.json());
    })
    .then(res => {
        if (!res || !res.result || res.result.length === 0) return;
        const card = res.result[0];
        
        let difficulty = card.difficulty;
        if (difficulty === undefined) {
            const ease = card.factor ? card.factor / 10 : 250;
            difficulty = Math.max(1.0, Math.min(10.0, ((300.0 - ease) / 170.0) * 9.0 + 1.0));
        }
        
        // 推荐阈值：4.40 (对应理解度 <= 66%, 仅针对最难的 20% 卡片触发)
        if (difficulty >= 4.40) {
            const toast = document.getElementById("comprehension-toast");
            if (toast) {
                toast.href = advancedUri;
                toast.style.display = "flex";
            }
        }
    })
    .catch(err => console.log("AnkiConnect error:", err));
}, 50);
</script>
